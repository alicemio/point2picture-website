  <path d="M680 458v-60" stroke="#8FA888" stroke-width="3"/>
  <ellipse cx="680" cy="392" rx="28" ry="20" fill="#8FA888" opacity="0.5"/>
  <ellipse cx="660" cy="408" rx="20" ry="16" fill="#8FA888" opacity="0.4"/>
  <ellipse cx="700" cy="404" rx="22" ry="18" fill="#8FA888" opacity="0.45"/>
  <rect x="668" y="458" width="24" height="20" rx="4" fill="#C9BFB2"/>
  <rect width="800" height="280" fill="url(#light)"/>
</svg>
